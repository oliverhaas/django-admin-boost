{% block object_tools_items %}
<li>
    {% set history_url = url(opts|admin_urlname('history'), original.pk|admin_urlquote, silent=True) %}
    <a href="{{ add_preserved_filters(history_url) }}" class="historylink">{{ gettext("History") }}</a>
</li>
{% if has_absolute_url %}<li><a href="{{ absolute_url }}" class="viewsitelink">{{ gettext("View on site") }}</a></li>{% endif %}
{% endblock %}
