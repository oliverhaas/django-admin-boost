{% block object_tools_items %}
  {% if has_add_permission %}
  <li>
    {% set add_url = url(cl.opts|admin_urlname('add'), silent=True) %}
    <a href="{{ add_preserved_filters(add_url, is_popup, to_field) }}" class="addlink">
      {% trans name=cl.opts.verbose_name %}Add {{ name }}{% endtrans %}
    </a>
  </li>
  {% endif %}
{% endblock %}
